<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <h3>Atendimentos</h3>

        {% for at in atendimentos %}
        <div class="chat-item" id="chat-item-{{ at.id }}" onclick="selecionar({{ at.id }})">
            <span class="chat-label">Cliente {{ at.id + 1 }} - {{ at.titulo }}</span>
            <span id="timer-{{ at.id }}" class="timer">Aguardando</span>
        </div>
        {% endfor %}
    </aside>

    <main class="chat-area">
        <div class="messages" id="messages"></div>

        <div class="painel-metricas" id="painel-metricas">
            <span>Coerência: <b id="m-coerencia">0</b></span>
            <span>Empatia: <b id="m-empatia">0</b></span>
            <span>Tempo: <b id="m-tempo">0</b></span>
            <span>Nota: <b id="m-nota">0</b></span>
            <span>Nível: <b id="m-nivel">-</b></span>
        </div>

        <div
            class="sugestao-box"
            id="sugestao"
            oncopy="return false"
            oncut="return false"
            onpaste="return false">
        </div>

        <div class="input-area">
            <textarea id="resposta" placeholder="Digite sua resposta..."></textarea>
            <button type="button" onclick="enviar()">Enviar</button>
        </div>
    </main>

</div>

<script>
let dados = {{ atendimentos | tojson }};
let atual = dados.length > 0 ? dados[0].id : 0;

const TEMPO_LIMITE = {{ tempo_limite_chat | tojson }};
const INTERVALO_ENTRE_CHATS = {{ intervalo_entre_chats | tojson }};
let simulacaoIniciadaEm = {{ simulacao_iniciada_em | tojson }};
let telaFinalMostrada = false;

function prepararDadosIniciais() {
    dados = dados.sort((a, b) => a.id - b.id);

    dados.forEach((at, index) => {
        at.finalizado = Boolean(at.finalizado);
        at.bloqueado_tempo = Boolean(at.bloqueado_tempo);
        at.total_erros = Number(at.total_erros || 0);
        at.media_coerencia = Number(at.media_coerencia || 0);
        at.media_empatia = Number(at.media_empatia || 0);
        at.media_tempo = Number(at.media_tempo || 0);
        at.nota = Number(at.nota || calcularNotaLocal(at));
        at.nivel = at.nivel || classificarGeral(at.nota);
        at.mensagens = at.mensagens || [];
        at.resposta_esperada = at.resposta_esperada || "";

        at.liberadoEm = Number(
            at.liberado_em !== undefined && at.liberado_em !== null
                ? at.liberado_em
                : simulacaoIniciadaEm + (index * INTERVALO_ENTRE_CHATS)
        );

        at.iniciado = (Date.now() / 1000) >= at.liberadoEm;

        if (at.ultimo_tempo_backend !== undefined && at.ultimo_tempo_backend !== null) {
            at.ultimoTempo = Number(at.ultimo_tempo_backend);
        } else {
            at.ultimoTempo = at.liberadoEm;
        }
    });
}

function calcularNotaLocal(at) {
    const base = Number(at.media_coerencia || 0);
    const bonusEmpatia = Number(at.media_empatia || 0);
    const bonusTempo = Number(at.media_tempo || 0);
    const penalidadeErros = Number(at.total_erros || 0) * 5;

    const nota = base + bonusEmpatia + bonusTempo - penalidadeErros;
    return Math.max(0, Math.min(100, Number(nota.toFixed(1))));
}

function escaparHtml(texto) {
    const div = document.createElement("div");
    div.innerText = texto;
    return div.innerHTML;
}

function destacarErros(texto, erros) {
    if (!erros || erros.length === 0) return escaparHtml(texto);

    const errosOrdenados = [...erros].sort((a, b) => a.offset - b.offset);

    let resultado = "";
    let cursor = 0;

    errosOrdenados.forEach(e => {
        if (e.offset < cursor) return;

        resultado += escaparHtml(texto.substring(cursor, e.offset));
        const trecho = texto.substring(e.offset, e.offset + e.length);
        resultado += `<span class="erro">${escaparHtml(trecho)}</span>`;
        cursor = e.offset + e.length;
    });

    resultado += escaparHtml(texto.substring(cursor));
    return resultado;
}

function buscarAtendimentoPorId(id) {
    return dados.find(item => item.id === id);
}

function atualizarPainel() {
    const at = buscarAtendimentoPorId(atual);
    if (!at) return;

    document.getElementById("m-coerencia").innerText = Number(at.media_coerencia || 0).toFixed(1);
    document.getElementById("m-empatia").innerText = Number(at.media_empatia || 0).toFixed(1);
    document.getElementById("m-tempo").innerText = Number(at.media_tempo || 0).toFixed(1);
    document.getElementById("m-nota").innerText = Number(at.nota || 0).toFixed(1);
    document.getElementById("m-nivel").innerText = at.nivel || "-";
}

function renderMensagens() {
    const at = buscarAtendimentoPorId(atual);
    if (!at) return;

    const box = document.getElementById("messages");
    box.innerHTML = "";

    at.mensagens.forEach(msg => {
        const div = document.createElement("div");
        div.className = msg.tipo === "cliente" ? "msg-cliente" : "msg-operador";

        if (msg.tipo === "operador") {
            let conteudo = msg.texto;

            if (msg.erros && msg.erros.length > 0) {
                conteudo = destacarErros(msg.texto, msg.erros);
            } else {
                conteudo = escaparHtml(msg.texto);
            }

            let avisosHtml = "";
            if (msg.avisos && msg.avisos.length > 0) {
                avisosHtml = `<div class="mensagem-erro-info">${msg.avisos.map(escaparHtml).join(" ")}</div>`;
            }

            div.innerHTML = conteudo + avisosHtml;
        } else {
            div.innerText = msg.texto;
        }

        box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
    atualizarPainel();
    atualizarEstadoCampo();
}

function chatJaFoiLiberado(at) {
    const agora = Date.now() / 1000;
    return agora >= at.liberadoEm;
}

function tempoDecorridoNoTurno(at) {
    const agora = Date.now() / 1000;
    return Math.max(0, Math.floor(agora - at.ultimoTempo));
}

function turnoExpirado(at) {
    if (at.finalizado) return false;
    if (!chatJaFoiLiberado(at)) return false;
    return tempoDecorridoNoTurno(at) >= TEMPO_LIMITE;
}

function atendimentoEncerrado(at) {
    return at.finalizado || at.bloqueado_tempo || turnoExpirado(at);
}

function verificarFinalizacaoGeral() {
    const algumChatLiberado = dados.some(at => chatJaFoiLiberado(at));
    if (!algumChatLiberado) return false;

    return dados.every(at => atendimentoEncerrado(at));
}

function atualizarEstadoCampo() {
    const at = buscarAtendimentoPorId(atual);
    const campo = document.getElementById("resposta");
    const botao = document.querySelector(".input-area button");

    if (!at) return;

    if (at.finalizado) {
        campo.disabled = true;
        botao.disabled = true;
        campo.placeholder = "Este atendimento foi finalizado.";
        return;
    }

    if (!chatJaFoiLiberado(at)) {
        campo.disabled = true;
        botao.disabled = true;
        campo.placeholder = "Este atendimento ainda não iniciou.";
        return;
    }

    if (turnoExpirado(at)) {
        at.bloqueado_tempo = true;
    }

    if (at.bloqueado_tempo) {
        campo.disabled = true;
        botao.disabled = true;
        campo.placeholder = "Tempo esgotado para este atendimento.";
        return;
    }

    campo.disabled = false;
    botao.disabled = false;
    campo.placeholder = "Digite sua resposta...";
}

function selecionar(id) {
    atual = id;
    const at = buscarAtendimentoPorId(id);
    if (!at) return;

    document.querySelectorAll(".chat-item").forEach(item => {
        item.classList.remove("ativo");
    });

    const itemAtual = document.getElementById("chat-item-" + id);
    if (itemAtual) {
        itemAtual.classList.add("ativo");
    }

    renderMensagens();

    document.getElementById("sugestao").innerText =
        "Sugestão: " + (at.resposta_esperada || "");
}

function encontrarUltimaMensagemOperador(mensagens) {
    for (let i = mensagens.length - 1; i >= 0; i--) {
        if (mensagens[i].tipo === "operador") {
            return i;
        }
    }
    return -1;
}

function enviar() {
    const at = buscarAtendimentoPorId(atual);

    if (!at || at.finalizado) return;
    if (!chatJaFoiLiberado(at)) return;
    if (at.bloqueado_tempo || turnoExpirado(at)) return;

    const campo = document.getElementById("resposta");
    const texto = campo.value.trim();

    if (!texto) return;

    fetch("/responder", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: at.id, resposta: texto })
    })
    .then(async r => {
        if (!r.ok) {
            let mensagem = "Erro ao responder atendimento.";
            try {
                const erroJson = await r.json();
                if (erroJson && erroJson.erro) {
                    mensagem = erroJson.erro;
                }
            } catch (e) {
                const erroTexto = await r.text();
                if (erroTexto) {
                    mensagem = erroTexto;
                }
            }
            throw new Error(mensagem);
        }
        return r.json();
    })
    .then(data => {
        at.mensagens = data.mensagens || [];

        const idxOperador = encontrarUltimaMensagemOperador(at.mensagens);
        if (idxOperador !== -1) {
            at.mensagens[idxOperador].erros = data.erros_detalhados || [];
            at.mensagens[idxOperador].avisos = data.avisos || [];
        }

        at.total_erros = Number(data.total_erros || 0);
        at.media_coerencia = Number(data.media_coerencia || 0);
        at.media_empatia = Number(data.media_empatia || 0);
        at.media_tempo = Number(data.media_tempo || 0);
        at.nota = Number(data.nota || 0);
        at.nivel = data.nivel || "-";
        at.finalizado = Boolean(data.finalizado);
        at.bloqueado_tempo = Boolean(data.bloqueado_tempo);

        if (data.liberado_em !== undefined && data.liberado_em !== null) {
            at.liberadoEm = Number(data.liberado_em);
        }

        if (data.sugestao) {
            at.resposta_esperada = data.sugestao;
        }

        if (!at.finalizado) {
            at.ultimoTempo = Date.now() / 1000;
        }

        renderMensagens();
        campo.value = "";
        campo.focus();

        document.getElementById("sugestao").innerText =
            "Sugestão: " + (data.sugestao || "");

        atualizarBadgeAtendimento(at);

        if (verificarFinalizacaoGeral()) {
            mostrarTelaFinal();
        }
    })
    .catch(error => {
        console.error("Erro no envio:", error);
        alert(error.message || "O atendimento não respondeu. Verifique o app.py ou o terminal do Flask.");
        atualizarEstadoCampo();
    });
}

function atualizarBadgeAtendimento(at) {
    const el = document.getElementById("timer-" + at.id);
    if (!el) return;

    if (at.finalizado) {
        el.innerText = "Finalizado";
        el.className = "timer verde";
        return;
    }

    if (at.bloqueado_tempo) {
        el.innerText = "Tempo esgotado";
        el.className = "timer vermelho";
    }
}

function iniciarNovaSimulacao() {
    window.location.href = "/";
}

function mostrarTelaFinal() {
    if (telaFinalMostrada) return;
    if (!verificarFinalizacaoGeral()) return;

    telaFinalMostrada = true;

    const total = dados.length;
    const somaNotas = dados.reduce((s, at) => s + Number(at.nota || 0), 0);
    const totalErros = dados.reduce((s, at) => s + Number(at.total_erros || 0), 0);

    const mediaGeral = total > 0 ? (somaNotas / total).toFixed(1) : "0.0";

    const mediaCoerencia = total > 0
        ? (dados.reduce((s, at) => s + Number(at.media_coerencia || 0), 0) / total).toFixed(1)
        : "0.0";

    const mediaEmpatia = total > 0
        ? (dados.reduce((s, at) => s + Number(at.media_empatia || 0), 0) / total).toFixed(1)
        : "0.0";

    const mediaTempo = total > 0
        ? (dados.reduce((s, at) => s + Number(at.media_tempo || 0), 0) / total).toFixed(1)
        : "0.0";

    const classificacao = classificarGeral(mediaGeral);

    const cardsAtendimentos = dados.map(at => {
        let status = "Finalizado";
        if (at.bloqueado_tempo && !at.finalizado) {
            status = "Encerrado por tempo";
        }

        return `
            <div class="resultado-card">
                <h3>Cliente ${at.id + 1} - ${escaparHtml(at.titulo)}</h3>
                <p><b>Status:</b> ${escaparHtml(status)}</p>
                <p><b>Nota:</b> ${Number(at.nota || 0).toFixed(1)}</p>
                <p><b>Coerência:</b> ${Number(at.media_coerencia || 0).toFixed(1)}</p>
                <p><b>Empatia:</b> ${Number(at.media_empatia || 0).toFixed(1)}</p>
                <p><b>Tempo:</b> ${Number(at.media_tempo || 0).toFixed(1)}</p>
                <p><b>Erros:</b> ${Number(at.total_erros || 0)}</p>
                <p><b>Nível:</b> ${escaparHtml(at.nivel || "-")}</p>
            </div>
        `;
    }).join("");

    document.querySelector(".container").innerHTML = `
        <div class="resultado-final">
            <div class="resultado-final-box">
                <h1>Resultado Final</h1>

                <div class="resultado-resumo">
                    <div class="resultado-destaque">
                        <span class="resultado-titulo">Média Geral</span>
                        <span class="resultado-valor">${mediaGeral}</span>
                    </div>

                    <div class="resultado-badges">
                        <span class="badge-resultado">Coerência: ${mediaCoerencia}</span>
                        <span class="badge-resultado">Empatia: ${mediaEmpatia}</span>
                        <span class="badge-resultado">Tempo: ${mediaTempo}</span>
                        <span class="badge-resultado">Erros: ${totalErros}</span>
                        <span class="badge-resultado destaque-nivel">Classificação: ${classificacao}</span>
                    </div>
                </div>

                <div class="resultado-grid">
                    ${cardsAtendimentos}
                </div>

                <div class="resultado-acoes">
                    <button type="button" class="botao-nova-simulacao" onclick="iniciarNovaSimulacao()">
                        Nova simulação
                    </button>
                </div>
            </div>
        </div>
    `;
}

function classificarGeral(media) {
    const nota = Number(media);
    if (nota >= 90) return "Especialista";
    if (nota >= 75) return "Bom";
    if (nota >= 60) return "Intermediário";
    return "Iniciante";
}

function atualizarTimers() {
    const agora = Date.now() / 1000;

    dados.forEach(at => {
        const el = document.getElementById("timer-" + at.id);
        if (!el) return;

        if (at.finalizado) {
            el.innerText = "Finalizado";
            el.className = "timer verde";
            return;
        }

        if (agora < at.liberadoEm) {
            const restante = Math.ceil(at.liberadoEm - agora);
            el.innerText = "Inicia em " + restante + "s";
            el.className = "timer";
            return;
        }

        at.iniciado = true;

        const tempo = Math.floor(agora - at.ultimoTempo);
        const p = tempo / TEMPO_LIMITE;

        el.className = "timer";

        if (p >= 1) {
            el.innerText = "Tempo esgotado";
            el.classList.add("vermelho");
            at.bloqueado_tempo = true;
        } else if (p >= 0.75) {
            el.innerText = tempo + "s";
            el.classList.add("vermelho");
        } else if (p >= 0.5) {
            el.innerText = tempo + "s";
            el.classList.add("amarelo");
        } else {
            el.innerText = tempo + "s";
            el.classList.add("verde");
        }
    });

    atualizarEstadoCampo();

    if (verificarFinalizacaoGeral()) {
        mostrarTelaFinal();
    }
}

document.addEventListener("DOMContentLoaded", () => {
    const input = document.getElementById("resposta");

    if (!input) return;

    input.addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            enviar();
        }
    });
});

prepararDadosIniciais();
setInterval(atualizarTimers, 1000);

window.onload = () => {
    if (dados.length > 0) {
        selecionar(dados[0].id);
        atualizarTimers();
    }
};
</script>

</body>
</html>
